# ── Backend Deployment ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: cinesearch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cinesearch-backend
  template:
    metadata:
      labels:
        app: cinesearch-backend
    spec:
      containers:
      - name: backend
        image: cinesearch-backend:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: cinesearch-config
              key: DB_HOST
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: cinesearch-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: cinesearch-config
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cinesearch-secret
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: cinesearch-secret
              key: JWT_SECRET
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: cinesearch-config
              key: PORT
---
# ── Backend Service (NodePort — accessible from teacher's PC) ─
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: cinesearch
spec:
  type: NodePort
  selector:
    app: cinesearch-backend
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30008          # Access: http://<your-ip>:30008/api