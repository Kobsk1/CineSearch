# ── Frontend Deployment ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: cinesearch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cinesearch-frontend
  template:
    metadata:
      labels:
        app: cinesearch-frontend
    spec:
      containers:
      - name: frontend
        image: cinesearch-frontend:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
# ── Frontend Service (NodePort — accessible from teacher's PC) ─
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: cinesearch
spec:
  type: NodePort
  selector:
    app: cinesearch-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007          # Access: http://<your-ip>:30007